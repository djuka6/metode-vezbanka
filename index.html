<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vežba za ispit</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-light: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .title {
      font-size: clamp(28px, 5vw, 42px);
      margin: 0 0 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .sidebar,
    .content {
      padding: 20px;
    }

    .section-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    select,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
    }

    select {
      padding: 12px 14px;
      background: var(--panel-light);
      color: var(--text);
      margin-bottom: 16px;
      outline: none;
    }

    .btn {
      padding: 12px 14px;
      color: white;
      background: var(--accent);
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .btn:hover { background: var(--accent-hover); }

    .btn.secondary {
      background: #374151;
    }

    .btn.secondary:hover {
      background: #4b5563;
    }

    .btn.reset {
      background: #7c2d12;
    }

    .btn.reset:hover {
      background: #9a3412;
    }

    .stats {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    .question-box {
      min-height: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid rgba(37, 99, 235, 0.35);
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 600;
    }

    .question-title {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .question-text {
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .answer-box {
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .answer-text {
      font-size: 16px;
      line-height: 1.7;
      color: #dbeafe;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      padding: 16px;
      white-space: pre-wrap;
    }

    .placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .notice {
      margin-top: auto;
      padding: 14px 16px;
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid rgba(22, 163, 74, 0.25);
      border-radius: 14px;
      color: #bbf7d0;
      font-size: 14px;
      line-height: 1.5;
    }

    .empty-state {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      padding: 40px 0;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .modal.open {
      display: flex;
    }

    .image-modal-content {
      width: min(1000px, 100%);
      max-height: 90vh;
      background: #0b1220;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(17, 24, 39, 0.96);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .icon-btn {
      width: auto;
      min-width: 44px;
      padding: 10px 14px;
      background: #374151;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .icon-btn:hover {
      background: #4b5563;
    }

    .image-modal-body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
      background: #0f172a;
    }

    #modalImage {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 12px;
      background: white;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      body {
        padding: 16px;
      }
    }
  </style>
</head>

          </div>

    </main>
  </div>

    const areaFilter = document.getElementById('areaFilter');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const openImageBtn = document.getElementById('openImageBtn');
    const resetBtn = document.getElementById('resetBtn');

    const questionText = document.getElementById('questionText');
    const answerText = document.getElementById('answerText');
    const areaBadge = document.getElementById('areaBadge');
    const pageBadge = document.getElementById('pageBadge');
    const imageBadge = document.getElementById('imageBadge');

    const totalCount = document.getElementById('totalCount');
    const remainingCount = document.getElementById('remainingCount');
    const shownCount = document.getElementById('shownCount');

    const imageModal = document.getElementById('imageModal');
    const closeImageModalBtn = document.getElementById('closeImageModalBtn');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');

    let currentQuestion = null;
    let shownQuestionIds = new Set();

    const svaPitanja = pitanja;

    function getAreas() {
      const uniqueAreas = [...new Set(svaPitanja.map(q => q.area))].sort((a, b) => a.localeCompare(b, 'sr'));
      return ['Sve oblasti', ...uniqueAreas];
    }

    function populateAreas() {
      areaFilter.innerHTML = '';
      getAreas().forEach(area => {
        const option = document.createElement('option');
        option.value = area;
        if (area === 'Sve oblasti') {
          option.textContent = `${area} (${svaPitanja.length})`;
        } else {
          const count = svaPitanja.filter(q => q.area === area).length;
          option.textContent = `${area} (${count})`;
        }
        areaFilter.appendChild(option);
      });
    }

    function getFilteredQuestions() {
      const selectedArea = areaFilter.value;
      if (selectedArea === 'Sve oblasti') return svaPitanja;
      return svaPitanja.filter(q => q.area === selectedArea);
    }

    function getAvailableQuestions() {
      return getFilteredQuestions().filter(q => !shownQuestionIds.has(q.id));
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function updateStats() {
      const filtered = getFilteredQuestions();
      const remaining = getAvailableQuestions();
      totalCount.textContent = filtered.length;
      remainingCount.textContent = remaining.length;
      shownCount.textContent = filtered.length - remaining.length;
    }

    function renderQuestion(question) {
      if (!question) {
        questionText.textContent = 'Nema dostupnih pitanja za izabrani filter.';
        questionText.className = 'question-text empty-state';
        answerText.textContent = 'Odgovor je sakriven. Klikni na „Prikaži odgovor“.';
        answerText.className = 'answer-text placeholder';
        areaBadge.textContent = 'Oblast: —';
        pageBadge.textContent = 'Strana pitanja: —';
        imageBadge.textContent = 'Slika: —';
        return;
      }

      questionText.textContent = question.pitanje;
      questionText.className = 'question-text';
      answerText.textContent = 'Odgovor je sakriven. Klikni na „Prikaži odgovor“.';
      answerText.className = 'answer-text placeholder';
      areaBadge.textContent = `Oblast: ${question.area}`;
      pageBadge.textContent = `Strana pitanja: ${question.pdf_page}`;
      imageBadge.textContent = `Slika: ${question.image || 'nema'}`;
    }

    function showRandomQuestion() {
      const available = getAvailableQuestions();

      if (available.length === 0) {
        currentQuestion = null;
        renderQuestion(null);
        updateStats();
        return;
      }

      currentQuestion = randomItem(available);
      shownQuestionIds.add(currentQuestion.id);
      renderQuestion(currentQuestion);
      updateStats();
    }

    function showAnswer() {
      if (!currentQuestion) return;
      answerText.textContent = currentQuestion.odgovor || 'Odgovor nije unet.';
      answerText.className = 'answer-text';
    }

    function resetQuestions() {
      shownQuestionIds = new Set();
      currentQuestion = null;
      questionText.textContent = 'Pitanja su resetovana. Klikni na dugme da dobiješ novo pitanje.';
      questionText.className = 'question-text empty-state';
      answerText.textContent = 'Odgovor je sakriven. Klikni na „Prikaži odgovor“.';
      answerText.className = 'answer-text placeholder';
      areaBadge.textContent = 'Oblast: —';
      pageBadge.textContent = 'Strana pitanja: —';
      imageBadge.textContent = 'Slika: —';
      updateStats();
    }

    function openImageModal() {
    if (!currentQuestion) {
        alert("Prvo izaberi pitanje.");
        return;
    }

    if (!currentQuestion.image) {
        alert("Za ovo pitanje nije definisana slika.");
        return;
    }

    modalImage.src = currentQuestion.image;
    imageModal.classList.add("open");
    }

        function closeImageModal() {
        imageModal.classList.remove('open');
        modalImage.src = '';
        }


    areaFilter.addEventListener('change', () => {
      currentQuestion = null;
      questionText.textContent = 'Filter je promenjen. Klikni da dobiješ nasumično pitanje iz izabrane oblasti.';
      questionText.className = 'question-text empty-state';
      answerText.textContent = 'Odgovor je sakriven. Klikni na „Prikaži odgovor“.';
      answerText.className = 'answer-text placeholder';
      areaBadge.textContent = 'Oblast: —';
      pageBadge.textContent = 'Strana pitanja: —';
      imageBadge.textContent = 'Slika: —';
      updateStats();
    });

    nextQuestionBtn.addEventListener('click', showRandomQuestion);
    openImageBtn.addEventListener('click', openImageModal);
    resetBtn.addEventListener('click', resetQuestions);
    closeImageModalBtn.addEventListener('click', closeImageModal);

    imageModal.addEventListener('click', (e) => {
      if (e.target === imageModal) {
        closeImageModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && imageModal.classList.contains('open')) {
        closeImageModal();
      }
    });

    populateAreas();
    updateStats();
  </script>
